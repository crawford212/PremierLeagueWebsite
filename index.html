<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Football Tables</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <div class="wrap">
    <header>
      <div class="pl-badge" id="leagueBadge">PL</div>
      <div class="header-text">
        <h1 id="leagueTitle">Premier League</h1>
        <p>Live Standings</p>
      </div>
      <div class="season-pill">2024 / 25</div>
    </header>

    <!-- League selector -->
    <div class="league-nav">
      <button class="league-btn active" data-league="39" data-name="Premier League" data-badge="PL" data-flag="🇬🇧">
        <span class="flag">🇬🇧</span>
        <span class="league-btn-name">Premier League</span>
      </button>
      <button class="league-btn" data-league="140" data-name="La Liga" data-badge="LL" data-flag="🇪🇸">
        <span class="flag">🇪🇸</span>
        <span class="league-btn-name">La Liga</span>
      </button>
      <button class="league-btn" data-league="135" data-name="Serie A" data-badge="SA" data-flag="🇮🇹">
        <span class="flag">🇮🇹</span>
        <span class="league-btn-name">Serie A</span>
      </button>
      <button class="league-btn" data-league="78" data-name="Bundesliga" data-badge="BL" data-flag="🇩🇪">
        <span class="flag">🇩🇪</span>
        <span class="league-btn-name">Bundesliga</span>
      </button>
      <button class="league-btn" data-league="61" data-name="Ligue 1" data-badge="L1" data-flag="🇫🇷">
        <span class="flag">🇫🇷</span>
        <span class="league-btn-name">Ligue 1</span>
      </button>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot champ"></div> Champions</div>
      <div class="legend-item"><div class="legend-dot ucl"></div> Champions League</div>
      <div class="legend-item"><div class="legend-dot uel"></div> Europa League</div>
      <div class="legend-item"><div class="legend-dot uecl"></div> Conference League</div>
      <div class="legend-item"><div class="legend-dot rel"></div> Relegation</div>
    </div>

    <div class="table-container">
      <table id="leagueTable">
        <thead>
          <tr>
            <th>#</th>
            <th class="left">Club</th>
            <th>P</th>
            <th class="hide-mob">W</th>
            <th class="hide-mob">D</th>
            <th class="hide-mob">L</th>
            <th class="hide-mob">GF</th>
            <th class="hide-mob">GA</th>
            <th>GD</th>
            <th>Pts</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr class="loading-row">
            <td colspan="10">
              <div class="loader-wrap">
                <div class="spinner"></div>
                <span>Loading standings…</span>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <p class="click-hint">↑ Click any row to view top scorers &amp; assisters</p>
  </div>

  <!-- Modal -->
  <div id="overlay" class="overlay" onclick="closeModalOnOverlay(event)">
    <div class="modal" id="modal">
      <div class="modal-header">
        <div class="modal-crest" id="modalCrest"></div>
        <div class="modal-title">
          <h2 id="modalTeam"></h2>
          <p id="modalSeason">2024/25 Season Stats</p>
        </div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-loading" id="modalLoading">
        <div class="spinner"></div>
        <span>Fetching player data…</span>
      </div>
      <div class="modal-body" id="modalBody" style="display:none">
        <div class="modal-section">
          <h3><span class="icon">⚽</span> Top Scorers</h3>
          <div id="modalScorers"></div>
        </div>
        <div class="modal-section">
          <h3><span class="icon">🎯</span> Top Assisters</h3>
          <div id="modalAssisters"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
